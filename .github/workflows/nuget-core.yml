name: Build and Publish J2534-Sharp.Core

on:
  push:
    branches:
      - master
    tags:
      - 'v[0-9]+.*'
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Determine version
      id: version
      shell: pwsh
      run: |
        if ($env:GITHUB_REF -match '^refs/tags/v(.+)$') {
          $version = $matches[1]
          echo "Version from tag: $version"
        } else {
          $version = "2.0.0-preview.$($env:GITHUB_RUN_NUMBER)"
          echo "Generated preview version: $version"
        }
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT

    - name: Restore
      run: dotnet restore src\J2534-Sharp.csproj

    - name: Build
      run: dotnet build src\J2534-Sharp.csproj -c Release --no-restore /p:Version=${{ steps.version.outputs.VERSION }}

    - name: Pack
      run: dotnet pack src\J2534-Sharp.csproj -c Release --no-build /p:Version=${{ steps.version.outputs.VERSION }}

    - name: Publish to NuGet.org
      if: startsWith(github.ref, 'refs/tags/v')
      run: dotnet nuget push src\bin\Release\*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package
        path: src\bin\Release\*.nupkg
