name: Build and Publish V1 Legacy

on:
  push:
    branches:
      - v1-legacy
    tags:
      - 'v1.*'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET Framework
      uses: microsoft/setup-msbuild@v2
      
    - name: Setup NuGet
      uses: nuget/setup-nuget@v2

    - name: Restore NuGet packages
      run: nuget restore J2534-Sharp.sln

    - name: Build solution
      run: msbuild J2534-Sharp.sln /p:Configuration=Release /p:Platform="Any CPU"
      
    - name: Determine version
      id: version
      shell: pwsh
      run: |
        if ($env:GITHUB_REF -match '^refs/tags/v1\.(.+)$') {
          $version = $matches[1]
          echo "Version from tag: $version"
        } else {
          $version = "1.0.0-preview.$($env:GITHUB_RUN_NUMBER)"
          echo "Generated preview version: $version"
        }
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        
    - name: Pack NuGet package
      run: nuget pack J2534-Sharp.nuspec -Version ${{ steps.version.outputs.VERSION }} -Properties configuration=Release
      
    - name: Publish to NuGet.org
      if: startsWith(github.ref, 'refs/tags/v1.')
      run: nuget push *.nupkg -Source https://api.nuget.org/v3/index.json -ApiKey ${{ secrets.NUGET_API_KEY }} -SkipDuplicate
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package
        path: '*.nupkg'
